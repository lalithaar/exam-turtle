<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Dashboard</title>

    <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Tahoma', -apple-system, BlinkMacSystemFont, sans-serif;
        font-weight: 300;
        line-height: 1.7;
        color: #1a1a1a;
        background-color: #fafafa;
        padding: 0;
        margin: 0;
    }

    .dashboard-container {
        max-width: 900px;
        margin: 0 auto;
        padding: 60px 40px;
        min-height: 100vh;
    }

    /* Navigation */
    .nav-tabs {
        list-style-type: none;
        display: flex;
        margin-bottom: 3rem;
        border: none;
    }

    .nav-tabs .nav-item {
        margin-right: 20px;
    }

    .nav-tabs .nav-link {
        color: #333;
        text-decoration: none;
        font-weight: 400;
        font-size: 0.95rem;
        border: none;
        background: none;
        padding: 0.5rem 0;
        transition: color 0.2s ease;
    }

    .nav-tabs .nav-link:hover {
        color: #000;
    }

    .nav-tabs .nav-link.active {
        color: #000;
        font-weight: 500;
        border-bottom: 2px solid #000;
        background: none;
    }

    /* Typography */
    h1, h2, h4, h6 {
        font-family: 'Crimson Text', serif;
        font-weight: 400;
        color: #000;
        letter-spacing: -0.02em;
    }

    h2 {
        font-size: 2.8rem;
        margin-bottom: 3rem;
    }

    h4 {
        font-size: 1.5rem;
        margin-bottom: 2rem;
        text-align: center;
    }

    h6 {
        font-size: 1.1rem;
        margin-bottom: 1rem;
    }

    /* Flash Messages */
    .alert {
        background-color: #f0f9ff;
        border: none;
        border-left: 3px solid #0ea5e9;
        padding: 1rem 1.5rem;
        margin: 2rem 0;
        font-size: 0.95rem;
        color: #0369a1;
        border-radius: 0;
    }

    .alert-danger {
        background-color: #fef2f2;
        border-left-color: #ef4444;
        color: #991b1b;
    }

    .alert-success {
        background-color: #f0fdf4;
        border-left-color: #22c55e;
        color: #166534;
    }

    /* Main Content Layout */
    .row {
        display: flex;
        gap: 3rem;
        margin-top: 2rem;
    }

    .col-md-8 {
        flex: 0 0 65%;
    }

    .col-md-4 {
        flex: 0 0 35%;
    }

    /* Priority Section */
    .priority-section {
        border: 1px solid #e5e5e5;
        padding: 2rem;
        margin-bottom: 2rem;
        background: white;
    }

    .topic-card {
        border: 1px solid #e5e5e5;
        padding: 1.5rem;
        margin-bottom: 1rem;
        background: white;
        transition: border-color 0.2s ease;
    }

    .topic-card:hover {
        border-color: #333;
    }

    .topic-card.low-retention {
        border-left: 4px solid #ef4444;
    }

    .topic-card.medium-retention {
        border-left: 4px solid #f59e0b;
    }

    .topic-card h6 {
        font-size: 1rem;
        margin-bottom: 0.5rem;
        font-weight: 500;
    }

    .topic-card small {
        color: #666;
        font-size: 0.85rem;
    }

    /* Badges */
    .badge {
        font-size: 0.8rem;
        padding: 0.4rem 0.8rem;
        font-weight: 400;
        border-radius: 0;
    }

    .bg-success {
        background-color: #22c55e !important;
        color: white;
    }

    .bg-warning {
        background-color: #f59e0b !important;
        color: white;
    }

    .bg-danger {
        background-color: #ef4444 !important;
        color: white;
    }

    /* Buttons */
    .btn {
        font-family: inherit;
        font-size: 0.9rem;
        font-weight: 400;
        padding: 0.6rem 1.2rem;
        border: 1px solid #333;
        background-color: white;
        color: #333;
        text-decoration: none;
        display: inline-block;
        cursor: pointer;
        transition: all 0.2s ease;
        border-radius: 0;
    }

    .btn:hover {
        background-color: #000;
        color: white;
        border-color: #000;
    }

    .btn-primary {
        background-color: #000;
        color: white;
        border-color: #000;
    }

    .btn-primary:hover {
        background-color: #333;
        border-color: #333;
    }

    .btn-success {
        background-color: #22c55e;
        color: white;
        border-color: #22c55e;
    }

    .btn-success:hover {
        background-color: #16a34a;
        border-color: #16a34a;
    }

    .btn-outline-secondary {
        background-color: white;
        color: #666;
        border-color: #d1d5db;
    }

    /* Sidebar */
    .sidebar-card {
        border: 1px solid #e5e5e5;
        padding: 1.5rem;
        margin-bottom: 2rem;
        background: white;
    }

    /* Form Styles */
    .quick-review-form {
        background: #f9f9f9;
        padding: 1.5rem;
        border: 1px solid #e5e5e5;
    }

    .form-label {
        font-weight: 400;
        color: #333;
        font-size: 0.9rem;
        margin-bottom: 0.5rem;
    }

    .form-select, .form-control {
        font-family: inherit;
        font-size: 0.9rem;
        padding: 0.7rem 1rem;
        border: 1px solid #d1d5db;
        background-color: white;
        color: #333;
        width: 100%;
        transition: border-color 0.2s ease;
        border-radius: 0;
    }

    .form-select:focus, .form-control:focus {
        outline: none;
        border-color: #000;
        box-shadow: none;
    }

    /* Rating Buttons */
    .rating-buttons {
        display: flex;
        gap: 0.5rem;
        margin: 0.5rem 0;
    }

    .rating-btn {
        border: 1px solid #d1d5db;
        background: white;
        color: #333;
        padding: 0.5rem 1rem;
        cursor: pointer;
        transition: all 0.2s ease;
        font-size: 0.85rem;
        flex: 1;
        text-align: center;
    }

    .rating-btn:hover {
        border-color: #333;
        background: #f5f5f5;
    }

    .rating-btn.selected {
        background: #000;
        color: white;
        border-color: #000;
    }

    /* Exam Strength */
    .exam-strength {
        font-size: 3rem;
        font-weight: 400;
        margin: 1rem 0;
        font-family: 'Crimson Text', serif;
    }

    .strength-excellent { color: #22c55e; }
    .strength-good { color: #3b82f6; }
    .strength-fair { color: #f59e0b; }
    .strength-poor { color: #f97316; }
    .strength-critical { color: #ef4444; }

    /* Utility Classes */
    .text-center { text-align: center; }
    .text-end { text-align: right; }
    .text-muted { color: #666; }
    .text-info { color: #3b82f6; }

    .d-flex { display: flex; }
    .justify-content-between { justify-content: space-between; }
    .align-items-center { align-items: center; }

    .mb-1 { margin-bottom: 0.25rem; }
    .mb-2 { margin-bottom: 0.5rem; }
    .mb-3 { margin-bottom: 1rem; }
    .mb-4 { margin-bottom: 2rem; }
    .mt-1 { margin-top: 0.25rem; }
    .mt-2 { margin-top: 0.5rem; }
    .mt-3 { margin-top: 1rem; }

    .w-100 { width: 100%; }

    .py-4 { padding-top: 2rem; padding-bottom: 2rem; }

    /* Responsive */
    @media (max-width: 768px) {
        .dashboard-container {
            padding: 40px 20px;
        }
        
        .row {
            flex-direction: column;
            gap: 2rem;
        }
        
        .col-md-8, .col-md-4 {
            flex: none;
        }
        
        h2 {
            font-size: 2.2rem;
        }
        
        .rating-buttons {
            flex-wrap: wrap;
        }
        
        .rating-btn {
            min-width: 48%;
        }
    }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!-- Flash Messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ 'danger' if category == 'error' else 'success' if category == 'success' else 'info' }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <!-- Navigation -->
        <ul class="nav nav-tabs">
            <li class="nav-item">
                <a class="nav-link active" href="{{ url_for('dashboard.index') }}">Dashboard</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#">Exams</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="{{ url_for('topics.list_topics') }}">Topics</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#">Analytics</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="{{ url_for('about') }}">About</a>
            </li>
        </ul>

        <div class="row">
            <!-- Main Content -->
            {{ content }}
            <p>Hello</p>
        </div>
    </div> 
</body>
</html>
